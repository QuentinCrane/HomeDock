<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 亮色圆角背景 -->
  <rect width="64" height="64" rx="14" fill="#f5f0e8"/>
  
  <!-- 胶囊主体 - 简约圆角矩形 -->
  <rect x="20" y="14" width="24" height="36" rx="12" fill="none" stroke="#4a7a9b" stroke-width="2.5"/>
  
  <!-- 胶囊内部线条 - 顶部 -->
  <line x1="26" y1="22" x2="38" y2="22" stroke="#4a7a9b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="26" x2="38" y2="26" stroke="#4a7a9b" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- 中心加号 -->
  <circle cx="32" cy="34" r="8" fill="none" stroke="#b07a55" stroke-width="2"/>
  <line x1="32" y1="29" x2="32" y2="39" stroke="#b07a55" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="34" x2="37" y2="34" stroke="#b07a55" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 底部装饰线 -->
  <line x1="26" y1="44" x2="38" y2="44" stroke="#4a7a9b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="47" x2="38" y2="47" stroke="#4a7a9b" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- 左右两侧简约圆点 -->
  <circle cx="10" cy="32" r="2" fill="#4a7a9b" opacity="0.3"/>
  <circle cx="54" cy="32" r="2" fill="#4a7a9b" opacity="0.3"/>
</svg>