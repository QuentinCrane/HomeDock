<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 亮色圆角背景 -->
  <rect width="64" height="64" rx="14" fill="#f5f0e8"/>
  
  <!-- 简约房子轮廓 - 棕色线条 -->
  <path d="M32 14 L50 30 L50 50 L14 50 L14 30 Z" fill="none" stroke="#b07a55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 房子顶部三角形 -->
  <path d="M32 14 L32 10 L52 30" fill="none" stroke="#b07a55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 门 - 简约矩形 -->
  <rect x="27" y="38" width="10" height="12" rx="2" fill="#b07a55" opacity="0.25"/>
  
  <!-- 左窗 -->
  <rect x="19" y="32" width="7" height="7" rx="1.5" fill="#b07a55"/>
  
  <!-- 右窗 -->
  <rect x="38" y="32" width="7" height="7" rx="1.5" fill="#b07a55"/>
  
  <!-- 飞来的胶囊 - 青色圆点 -->
  <circle cx="52" cy="14" r="4" fill="#4a7a9b"/>
  
  <!-- 简约虚线轨迹 -->
  <path d="M53 18 Q50 24 46 28" stroke="#4a7a9b" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2"/>
</svg>